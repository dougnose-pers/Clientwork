function sha256(s){return crypto.subtle.digest("SHA-256",new TextEncoder().encode(s)).then(b=>Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,"0")).join(""))}

function unlock(){
  const pw=document.getElementById("pwInput").value;
  sha256(pw).then(h=>{
    if(h===H){
      // Decode and render
      const head=atob(HD);
      const body=atob(BD);
      document.open();
      document.write("<!DOCTYPE html><html lang=\"en\"><head>"+head+"</head><body>"+body+"</body></html>");
      document.close();
    }else{
      document.getElementById("pwInput").classList.add("error");
      document.getElementById("loginError").classList.add("show");
    }
  });
}

document.getElementById("loginBtn").addEventListener("click",unlock);
document.getElementById("pwInput").addEventListener("keydown",function(e){if(e.key==="Enter")unlock()});
document.getElementById("pwInput").addEventListener("input",function(){
  this.classList.remove("error");
  document.getElementById("loginError").classList.remove("show");
});
</script>
